<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bug Forest Explorer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --dark:#081820;--shadow:#1a3a2a;--mid:#306850;--light:#86c06c;
  --hl:#e0f8cf;--white:#f8fcf0;--blue:#3890f8;--red:#e04040;
  --orange:#f8a030;--yellow:#f8e030;--pink:#f868f8;
  --ui1:#f06030;--ui2:#c04820;--uib:#401810;--ts:#282828;
}
body{background:#000;display:flex;justify-content:center;align-items:center;min-height:100dvh;font-family:'Press Start 2P',monospace;overflow:hidden;image-rendering:pixelated}
#gc{width:100%;max-width:420px;height:100dvh;max-height:820px;background:var(--hl);display:flex;flex-direction:column;position:relative;overflow:hidden;border:3px solid var(--dark)}

/* HUD */
#hud{background:linear-gradient(180deg,var(--ui1),var(--ui2));border-bottom:3px solid var(--uib);padding:6px 8px;display:flex;justify-content:space-between;align-items:center;z-index:10;flex-shrink:0;gap:2px}
.st{font-size:6px;color:var(--white);text-shadow:1px 1px 0 var(--ts);line-height:1.5;white-space:nowrap}
.st .v{color:var(--yellow)}
#xp-bar-wrap{width:100%;height:6px;background:rgba(0,0,0,0.3);border-radius:3px;border:1px solid var(--uib);flex-shrink:0}
#xp-bar{height:100%;background:linear-gradient(90deg,#58c840,#a8f868);border-radius:2px;transition:width 0.3s;width:0%}
#hud-row2{display:flex;justify-content:space-between;align-items:center;padding:2px 8px 4px;background:var(--ui2);border-bottom:2px solid var(--uib);flex-shrink:0}

/* TIME & WEATHER */
#time-weather{display:flex;gap:8px;font-size:6px;color:var(--hl);text-shadow:1px 1px 0 var(--ts)}

/* FOREST */
#forest{flex:1;position:relative;overflow:hidden;cursor:pointer;background:#4a8c50;transition:background 1s}
#forest-bg{position:absolute;inset:0;overflow:hidden}
#weather-overlay{position:absolute;inset:0;pointer-events:none;z-index:6;overflow:hidden}
#night-overlay{position:absolute;inset:0;pointer-events:none;z-index:7;background:rgba(8,20,50,0);transition:background 2s}
.tree{position:absolute;font-size:28px;filter:brightness(0.9);text-shadow:2px 2px 0 #1a3a1a;pointer-events:none;z-index:1}
.grass-tile{position:absolute;width:16px;height:16px}
.flower{position:absolute;font-size:12px;pointer-events:none;z-index:1}
.env-detail{position:absolute;pointer-events:none;z-index:2;font-size:14px}

/* BUGS */
.bug-sprite{position:absolute;z-index:5;cursor:pointer;animation:bugIdle 0.6s steps(2) infinite;filter:drop-shadow(1px 2px 0 rgba(0,0,0,0.3));user-select:none;-webkit-user-select:none;font-size:24px}
.bug-sprite:active{transform:scale(1.3)}
.bug-sprite.fleeing{animation:bugFlee 0.3s steps(2) infinite}
@keyframes bugIdle{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
@keyframes bugFlee{0%,100%{transform:translateY(0) scaleX(-1)}50%{transform:translateY(-3px) scaleX(-1)}}
.bug-sprite.caught{animation:bugCatch 0.4s ease-out forwards;pointer-events:none}
@keyframes bugCatch{0%{transform:scale(1);opacity:1}50%{transform:scale(1.8);opacity:.8}100%{transform:scale(0);opacity:0}}

/* EFFECTS */
.catch-flash{position:absolute;width:40px;height:40px;border-radius:50%;background:radial-gradient(circle,var(--white) 0%,transparent 70%);pointer-events:none;z-index:20;animation:flash .3s ease-out forwards}
@keyframes flash{0%{transform:scale(.5);opacity:1}100%{transform:scale(3);opacity:0}}
.catch-text{position:absolute;z-index:25;font-size:7px;color:var(--white);text-shadow:1px 1px 0 var(--ts);pointer-events:none;animation:floatUp 1.2s ease-out forwards;white-space:nowrap}
@keyframes floatUp{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-50px);opacity:0}}
.combo-text{position:absolute;z-index:26;font-size:10px;color:var(--yellow);text-shadow:2px 2px 0 var(--ts);pointer-events:none;animation:comboPop .8s ease-out forwards;white-space:nowrap;left:50%;top:40%}
@keyframes comboPop{0%{transform:translate(-50%,0) scale(0.5);opacity:0}30%{transform:translate(-50%,0) scale(1.4);opacity:1}100%{transform:translate(-50%,-30px) scale(1);opacity:0}}
.sparkle{position:absolute;width:4px;height:4px;background:var(--white);border-radius:50%;pointer-events:none;z-index:3;animation:sparkle 1.5s ease-out forwards}
@keyframes sparkle{0%{transform:scale(0);opacity:1}50%{transform:scale(1);opacity:.8}100%{transform:scale(0);opacity:0}}
.raindrop{position:absolute;width:2px;height:8px;background:rgba(150,180,255,0.5);pointer-events:none;z-index:6;animation:rain .6s linear forwards}
@keyframes rain{0%{transform:translateY(-10px);opacity:.7}100%{transform:translateY(var(--fh));opacity:0}}
.leaf{position:absolute;font-size:10px;pointer-events:none;z-index:4;animation:leafFall 4s linear forwards}
@keyframes leafFall{0%{transform:translateY(-20px) rotate(0deg);opacity:.8}100%{transform:translateY(var(--fh)) rotate(720deg);opacity:0}}

/* PLAYER */
#player{position:absolute;z-index:8;font-size:22px;filter:drop-shadow(1px 2px 0 rgba(0,0,0,0.4));pointer-events:none;transition:left .5s ease-in-out,top .5s ease-in-out}

/* EXPLORE & NET BUTTONS */
#action-bar{position:absolute;bottom:175px;left:0;right:0;display:flex;justify-content:center;gap:8px;z-index:15;padding:0 12px}
.action-btn{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--white);text-shadow:1px 1px 0 var(--ts);border:3px solid var(--dark);border-radius:8px;padding:8px 14px;cursor:pointer;box-shadow:0 4px 0 var(--dark);transition:transform .05s,box-shadow .05s;white-space:nowrap}
.action-btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--dark)}
#explore-btn{background:linear-gradient(180deg,#58a840,#388028)}
#net-btn{background:linear-gradient(180deg,#4080c0,#305898)}
#net-btn.cooldown{opacity:0.4;pointer-events:none}

/* AREA BANNER */
#area-banner{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);z-index:30;background:var(--dark);border:3px solid var(--hl);padding:12px 24px;font-size:8px;color:var(--hl);text-shadow:1px 1px 0 var(--mid);text-align:center;pointer-events:none;opacity:0;transition:opacity .3s;line-height:2.2}
#area-banner.show{opacity:1}
#area-banner .area-sub{font-size:5px;color:var(--light);margin-top:2px}

/* BOTTOM PANEL */
#bottom-panel{background:linear-gradient(180deg,var(--ui1),var(--ui2));border-top:3px solid var(--uib);flex-shrink:0;z-index:10}
#tabs{display:flex;border-bottom:2px solid var(--uib)}
.tab{flex:1;padding:5px 2px;font-family:'Press Start 2P',monospace;font-size:5px;color:var(--hl);text-shadow:1px 1px 0 var(--ts);background:transparent;border:none;cursor:pointer;text-align:center;border-right:1px solid var(--uib);opacity:.5}
.tab:last-child{border-right:none}
.tab.active{opacity:1;background:rgba(0,0,0,.2);color:var(--yellow)}
.tab .notif{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--red);margin-left:2px;vertical-align:middle}
#tab-content{height:155px;overflow-y:auto;padding:6px 8px;scrollbar-width:thin;scrollbar-color:var(--uib) transparent}

/* DEX */
.dex-entry{display:flex;align-items:center;gap:6px;padding:4px 3px;border-bottom:1px solid rgba(0,0,0,.12);font-size:5.5px;color:var(--white);text-shadow:1px 1px 0 var(--ts);cursor:pointer}
.dex-entry:active{background:rgba(0,0,0,.15)}
.dex-entry .emoji{font-size:16px;filter:drop-shadow(1px 1px 0 rgba(0,0,0,.4))}
.dex-entry .info{flex:1;line-height:1.7}
.dex-entry .name{color:var(--yellow)}
.dex-entry .stars{color:var(--orange);font-size:5px}
.rarity-common{color:var(--hl)}.rarity-uncommon{color:#70d8f8}.rarity-rare{color:var(--orange)}.rarity-legendary{color:var(--pink)}.rarity-mythic{color:#f84848}
.dex-entry.undiscovered{opacity:.3}
.dex-entry.undiscovered .emoji{filter:brightness(0) drop-shadow(1px 1px 0 rgba(0,0,0,.4))}

/* UPGRADES */
.upgrade-btn{display:flex;align-items:center;gap:6px;width:100%;padding:5px 6px;margin-bottom:4px;font-family:'Press Start 2P',monospace;font-size:5.5px;color:var(--white);text-shadow:1px 1px 0 var(--ts);background:rgba(0,0,0,.2);border:2px solid rgba(255,255,255,.12);border-radius:4px;cursor:pointer;text-align:left;line-height:1.6}
.upgrade-btn:active{background:rgba(0,0,0,.4)}
.upgrade-btn:disabled{opacity:.3;cursor:default}
.upgrade-btn .cost{color:var(--yellow)}
.upgrade-btn .max-tag{color:var(--light);font-size:5px}
.upgrade-section{font-size:6px;color:var(--yellow);text-shadow:1px 1px 0 var(--ts);padding:6px 0 3px;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:4px}

/* ACHIEVEMENTS */
.ach-entry{display:flex;align-items:center;gap:6px;padding:4px;border-bottom:1px solid rgba(0,0,0,.1);font-size:5px;color:var(--white);text-shadow:1px 1px 0 var(--ts)}
.ach-entry .icon{font-size:14px}
.ach-entry.locked{opacity:.35}
.ach-entry .ach-reward{color:var(--yellow)}

/* LOG */
#log-content{font-size:5.5px;color:var(--hl);text-shadow:1px 1px 0 var(--ts);line-height:1.9}
.log-rare{color:var(--orange)}.log-legendary{color:var(--pink)}.log-mythic{color:#f84848}.log-event{color:var(--blue)}.log-ach{color:#a8f868}

/* DETAIL MODAL */
#detail-modal{position:absolute;inset:0;z-index:50;background:rgba(0,0,0,.7);display:none;justify-content:center;align-items:center;padding:20px}
#detail-modal.show{display:flex}
#detail-card{background:linear-gradient(180deg,#283848,#182028);border:3px solid var(--hl);border-radius:8px;padding:16px;max-width:300px;width:100%;text-align:center;color:var(--white);text-shadow:1px 1px 0 var(--ts)}
#detail-card .big-emoji{font-size:48px;display:block;margin:8px 0}
#detail-card .d-name{font-size:9px;color:var(--yellow);margin:6px 0}
#detail-card .d-rarity{font-size:6px;margin:4px 0}
#detail-card .d-lore{font-size:5.5px;line-height:1.8;margin:10px 0;color:var(--hl);text-align:left;padding:8px;background:rgba(0,0,0,.3);border-radius:4px}
#detail-card .d-stats{font-size:5.5px;line-height:2;text-align:left;margin:8px 0}
#detail-card .d-close{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--white);background:var(--ui2);border:2px solid var(--uib);border-radius:4px;padding:6px 16px;cursor:pointer;margin-top:8px}

/* LEVEL UP BANNER */
#lvl-banner{position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);z-index:35;background:linear-gradient(180deg,#f8d830,#e08020);border:3px solid var(--dark);border-radius:8px;padding:10px 20px;font-size:10px;color:var(--dark);text-shadow:1px 1px 0 rgba(255,255,255,.3);text-align:center;pointer-events:none;opacity:0;transition:opacity .3s;line-height:2}
#lvl-banner.show{opacity:1}

@media(max-height:650px){#tab-content{height:120px}}
</style>
</head>
<body>
<div id="gc">
  <div id="hud">
    <div class="st">Lv<span class="v" id="h-lvl">1</span></div>
    <div class="st">🐛<span class="v" id="h-bugs">0</span></div>
    <div class="st" id="h-combo" style="opacity:0">×<span class="v" id="h-combo-val">1</span></div>
    <div class="st">⭐<span class="v" id="h-coins">0</span></div>
  </div>

    <div id="xp-bar-wrap"><div id="xp-bar"></div></div>

  </div>

  <div id="forest">
    <div id="forest-bg"></div>

  <div id="detail-modal"><div id="detail-card"></div></div>
</div>

<script>
// ═══════════════════════════════════════════════════
//  BUG FOREST EXPLORER — Full Game
// ═══════════════════════════════════════════════════

// ── AUDIO ENGINE (tiny Web Audio bleeps) ──
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx;
function ensureAudio(){if(!actx)actx=new AudioCtx()}
function beep(freq,dur,vol=0.08,type='square'){
  ensureAudio();if(!actx)return;
  const o=actx.createOscillator(),g=actx.createGain();
  o.type=type;o.frequency.value=freq;g.gain.value=vol;
  o.connect(g);g.connect(actx.destination);
  o.start();g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+dur);
  o.stop(actx.currentTime+dur);
}
function sfxCatch(){beep(880,.08);setTimeout(()=>beep(1320,.1),80)}
function sfxRare(){beep(660,.1);setTimeout(()=>beep(990,.1),100);setTimeout(()=>beep(1320,.15),200)}
function sfxLegendary(){beep(440,.12);setTimeout(()=>beep(660,.12),120);setTimeout(()=>beep(880,.12),240);setTimeout(()=>beep(1320,.2),360)}
function sfxLevelUp(){beep(523,.1);setTimeout(()=>beep(659,.1),100);setTimeout(()=>beep(784,.1),200);setTimeout(()=>beep(1047,.2),300)}
function sfxUpgrade(){beep(600,.06);setTimeout(()=>beep(900,.1),60)}
function sfxCombo(){beep(1200,.05);setTimeout(()=>beep(1600,.08),50)}

// ── BUG DATABASE (30 bugs) ──
const BUGS = [

  {id:8, name:"Grasshopper",emoji:"🦗",rarity:"uncommon",coins:4,xp:5,areas:[1,3],behavior:"jumpy",

  {id:9, name:"Garden Spider",emoji:"🕷️",rarity:"uncommon",coins:5,xp:7,areas:[1,2],behavior:"ambush",

  {id:12,name:"Water Strider",emoji:"〰️",rarity:"uncommon",coins:4,xp:6,areas:[2],behavior:"skitter",

  {id:15,name:"Stag Beetle",emoji:"🪲",rarity:"uncommon",coins:6,xp:8,areas:[3,4],behavior:"calm",

const AREAS = [
  {id:0,name:"Mossy Path",sub:"Where all journeys begin",color:"#4a8c50",dark:"#2a5830",trees:"🌳",deco:["🪨","🍂","🪵"],unlock:0},
  {id:1,name:"Flower Meadow",sub:"Buzzing with life",color:"#6aac4a",dark:"#3a7828",trees:"🌻",deco:["🌷","🌼","🌺"],unlock:0},

// ── XP / LEVELING ──
function xpForLevel(lv){return Math.floor(20*Math.pow(1.4,lv-1))}
function addXP(amount){
  const bonus=S.upgrades.charm;
  amount=Math.floor(amount*(1+bonus*0.15));
  S.xp+=amount;
  while(S.xp>=xpForLevel(S.level)){
    S.xp-=xpForLevel(S.level);
    S.level++;
    showLevelUp();
    sfxLevelUp();
    S.coins+=S.level*3;
    addLog(`<span class="log-event">🎉 LEVEL UP! Now Lv.${S.level}! +${S.level*3}⭐</span>`);
  }
  updateHUD();
}

function showLevelUp(){
  const b=document.getElementById('lvl-banner');

// ── TIME SYSTEM ──
function getTimeOfDay(){
  if(S.time<80)return'day';if(S.time<120)return'dusk';if(S.time<200)return'night';return'dawn';
}
function tickTime(){
  S.time=(S.time+1)%240;
  const tod=getTimeOfDay();
  let alpha=0;
  if(tod==='dusk') alpha=((S.time-80)/40)*0.45;
  else if(tod==='night') alpha=0.45;
  else if(tod==='dawn') alpha=0.45*(1-(S.time-200)/40);
  nightOvl.style.background=`rgba(8,15,50,${alpha})`;

  const icons={day:'☀️ DAY',dusk:'🌅 DUSK',night:'🌙 NIGHT',dawn:'🌄 DAWN'};
  document.getElementById('h-time').textContent=icons[tod];

  // adjust forest brightness
  if(tod==='night'){forest.style.filter='brightness(0.7) saturate(0.8)'}
  else if(tod==='dusk'||tod==='dawn'){forest.style.filter='brightness(0.85) saturate(0.9)'}
  else{forest.style.filter=''}
}

    const roll=Math.random();

    else if(roll<0.75){S.weather='rain';S.weatherTimer=30+Math.random()*40}
    else if(roll<0.9){S.weather='wind';S.weatherTimer=20+Math.random()*30}

  const icons={clear:'🌤️',rain:'🌧️',wind:'🍃',fog:'🌫️'};
  document.getElementById('h-weather').textContent=icons[S.weather];
  renderWeather();
}

function shadeColor(hex,pct){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.max(0,Math.min(255,r+Math.floor(r*pct/100)));
  g=Math.max(0,Math.min(255,g+Math.floor(g*pct/100)));
  b=Math.max(0,Math.min(255,b+Math.floor(b*pct/100)));
  return `rgb(${r},${g},${b})`;
}

function addCombo(){

// ── BUG SPAWNING ──
function getSpawnRate(){return Math.max(800,3000-S.upgrades.lure*260)}
function getRarityWeights(){
  const e=S.upgrades.eyes;
  return{common:50-e*4,uncommon:30+e*1,rare:14+e*2,legendary:5+e*1,mythic:1+e*0.3};
}

function pickBug(){
  const area=S.area,tod=getTimeOfDay();
  const lampLvl=S.upgrades.lamp;
  let available=BUGS.filter(b=>{
    if(!b.areas.includes(area))return false;
    if(b.timeReq==='night'&&tod!=='night'&&tod!=='dusk'&&lampLvl<1)return false;
    return true;
  });
  if(!available.length)available=BUGS.filter(b=>b.areas.includes(area));
  const weights=getRarityWeights();
  // weather bonuses
  let wMod={common:0,uncommon:0,rare:0,legendary:0,mythic:0};
  if(S.weather==='rain'){wMod.uncommon+=5;wMod.rare+=3}
  if(S.weather==='fog'){wMod.rare+=5;wMod.legendary+=2;wMod.mythic+=0.5}
  if(getTimeOfDay()==='night'){wMod.rare+=3;wMod.legendary+=1}

  const weighted=available.map(b=>({bug:b,w:Math.max(1,(weights[b.rarity]||1)+(wMod[b.rarity]||0))}));
  const total=weighted.reduce((s,x)=>s+x.w,0);
  let r=Math.random()*total;
  for(const{bug,w}of weighted){r-=w;if(r<=0)return bug}
  return available[0];
}

function spawnBug(){
  const bug=pickBug();if(!bug)return;
  const el=document.createElement('div');
  el.className='bug-sprite';el.textContent=bug.emoji;
  let x=20+Math.random()*(fW-60),y=20+Math.random()*(fH-80);
  el.style.left=x+'px';el.style.top=y+'px';

  if(bug.rarity==='rare')el.style.filter+=' hue-rotate(20deg) saturate(1.3)';
  if(bug.rarity==='legendary')el.style.filter+=' hue-rotate(270deg) brightness(1.2)';
  if(bug.rarity==='mythic')el.style.filter+=' hue-rotate(60deg) brightness(1.4) saturate(1.5)';
  if(bug.behavior==='glow')el.style.textShadow='0 0 8px rgba(255,255,100,0.8)';

  const catchHandler=(e)=>{e.stopPropagation();e.preventDefault();catchBug(bug,el)};
  el.addEventListener('click',catchHandler);
  el.addEventListener('touchstart',catchHandler,{passive:false});
  forest.appendChild(el);

  // behavior-driven movement
  const speed=bug.behavior==='fast'?80:bug.behavior==='slow'?25:bug.behavior==='jumpy'?100:50;
  const wanderDist=bug.behavior==='jumpy'?90:bug.behavior==='flutter'?70:bug.behavior==='ambush'?15:50;
  const wanderInt=setInterval(()=>{
    if(!el.parentElement||el.classList.contains('caught'))return;
    const cx=parseFloat(el.style.left),cy=parseFloat(el.style.top);
    let nx=cx+(Math.random()-0.5)*wanderDist*2;
    let ny=cy+(Math.random()-0.5)*wanderDist*2;
    nx=Math.max(10,Math.min(fW-40,nx));ny=Math.max(10,Math.min(fH-70,ny));
    const dur=bug.behavior==='jumpy'?0.3:bug.behavior==='fast'?1:2.5;
    el.style.transition=`left ${dur}s ${bug.behavior==='jumpy'?'ease-out':'linear'}, top ${dur}s ${bug.behavior==='jumpy'?'ease-out':'linear'}`;
    el.style.left=nx+'px';el.style.top=ny+'px';
    if(bug.behavior==='flutter'){el.style.transform=`rotate(${(Math.random()-0.5)*20}deg)`}
  },bug.behavior==='fast'?1200:bug.behavior==='jumpy'?800:2500);

  // flee on nearby miss click
  const fleeCheck=(e)=>{
    if(!el.parentElement||el.classList.contains('caught'))return;
    const rect=el.getBoundingClientRect();
    const dx=e.clientX-(rect.left+rect.width/2),dy=e.clientY-(rect.top+rect.height/2);
    if(Math.sqrt(dx*dx+dy*dy)<60&&bug.behavior!=='ambush'&&bug.behavior!=='slow'){
      el.classList.add('fleeing');
      const away=dx>0?-80:80;
      el.style.transition='left 0.3s, top 0.3s';
      el.style.left=Math.max(5,Math.min(fW-40,parseFloat(el.style.left)+away))+'px';
      setTimeout(()=>el.classList.remove('fleeing'),500);
    }
  };
  forest.addEventListener('click',fleeCheck);

  const despawnTime=10000+Math.random()*6000-(bug.rarity==='legendary'?3000:bug.rarity==='mythic'?5000:0);
  setTimeout(()=>{
    clearInterval(wanderInt);forest.removeEventListener('click',fleeCheck);
    if(el.parentElement&&!el.classList.contains('caught')){
      el.style.transition='opacity 0.8s';el.style.opacity='0';
      setTimeout(()=>el.remove(),800);
    }
  },despawnTime);

  // auto-catch from net upgrade
  if(S.upgrades.net>0){
    const delay=6000-S.upgrades.net*600;
    setTimeout(()=>{if(el.parentElement&&!el.classList.contains('caught'))catchBug(bug,el)},delay);
  }
}

// ── CATCH BUG ──
function catchBug(bug,el){
  if(el.classList.contains('caught'))return;
  el.classList.add('caught');ensureAudio();

  if(bug.rarity==='legendary'||bug.rarity==='mythic')sfxLegendary();
  else if(bug.rarity==='rare')sfxRare();
  else sfxCatch();

  // flash
  const fl=document.createElement('div');fl.className='catch-flash';
  fl.style.left=(parseFloat(el.style.left)-8)+'px';fl.style.top=(parseFloat(el.style.top)-8)+'px';
  forest.appendChild(fl);setTimeout(()=>fl.remove(),300);

  const isNew=!S.discovered[bug.id];
  addCombo();
  const comboMult=getComboMultiplier();
  const jarBonus=S.upgrades.jar;
  const bookBonus=isNew?S.upgrades.book*2:0;
  let coinGain=Math.floor((bug.coins+jarBonus+bookBonus)*comboMult);
  if(S.weather==='rain')coinGain=Math.floor(coinGain*1.2);

  // float text
  const txt=document.createElement('div');txt.className='catch-text';
  let label=`${bug.emoji} ${bug.name}! +${coinGain}⭐`;
  if(isNew)label+=`<br>★ NEW SPECIES ★`;
  if(comboMult>1)label+=`<br>×${comboMult.toFixed(2)} combo`;
  txt.innerHTML=label;
  txt.style.left=el.style.left;txt.style.top=(parseFloat(el.style.top)-10)+'px';
  if(bug.rarity==='rare')txt.style.color='#f8a030';
  if(bug.rarity==='legendary')txt.style.color='#f868f8';
  if(bug.rarity==='mythic')txt.style.color='#f84848';
  forest.appendChild(txt);setTimeout(()=>txt.remove(),1200);

  player.style.left=(parseFloat(el.style.left)-5)+'px';
  player.style.top=(parseFloat(el.style.top)+5)+'px';

  S.coins+=coinGain;S.totalBugs++;
  S.discovered[bug.id]=(S.discovered[bug.id]||0)+1;
  if(getTimeOfDay()==='night')S.nightCatches++;
  if(S.weather==='rain')S.rainCatches++;

  const rc=bug.rarity==='mythic'?'log-mythic':bug.rarity==='legendary'?'log-legendary':bug.rarity==='rare'?'log-rare':'';
  addLog(`<span class="${rc}">${isNew?'🆕 ':''}Caught ${bug.emoji} ${bug.name}! +${coinGain}⭐${comboMult>1?' (×'+comboMult.toFixed(1)+')':''}</span>`);

  addXP(bug.xp);
  setTimeout(()=>el.remove(),400);
  updateHUD();renderDex();checkAchievements();
}

      Value: ${bug.coins}⭐ / ${bug.xp} XP<br>
      Areas: ${bug.areas.map(a=>AREAS[a].name).join(', ')}<br>
      ${bug.timeReq?'Appears at: '+bug.timeReq.toUpperCase()+'<br>':''}
      Behavior: ${bug.behavior}
    </div>
    <div class="d-lore">${bug.lore}</div>
    <button class="d-close" id="close-detail">CLOSE</button>
  `;
  m.classList.add('show');
  document.getElementById('close-detail').addEventListener('click',()=>m.classList.remove('show'));
  m.addEventListener('click',(e)=>{if(e.target===m)m.classList.remove('show')});
}

// ── RENDER FUNCTIONS ──
function updateHUD(){
  document.getElementById('h-lvl').textContent=S.level;
  document.getElementById('h-bugs').textContent=S.totalBugs;
  document.getElementById('h-coins').textContent=S.coins;
  document.getElementById('h-area').textContent=AREAS[S.area].name;
  const pct=Math.min(100,Math.floor(S.xp/xpForLevel(S.level)*100));
  document.getElementById('xp-bar').style.width=pct+'%';
  const comboEl=document.getElementById('h-combo');
  if(S.combo>=2){comboEl.style.opacity='1';document.getElementById('h-combo-val').textContent=S.combo}
  else{comboEl.style.opacity='0'}
  renderUpgrades();
}

function renderDex(){
  const panel=document.getElementById('dex-panel');
  panel.innerHTML=BUGS.map(b=>{
    const found=S.discovered[b.id]||0;
    const cls=found?'':'undiscovered';
    const stars=found>=50?'★★★★★':found>=20?'★★★★':found>=10?'★★★':found>=5?'★★':found>=1?'★':'';
    return `<div class="dex-entry ${cls}" data-bid="${b.id}">
      <span class="emoji">${b.emoji}</span>
      <div class="info">
        <div class="name">${found?b.name:'???'} <span class="stars">${stars}</span></div>
        <div><span class="rarity-${b.rarity}">${b.rarity.toUpperCase()}</span> ×${found}</div>
      </div>
      <div style="font-size:5px">${found?b.coins+'⭐':''}</div>
    </div>`;
  }).join('');
  panel.querySelectorAll('.dex-entry:not(.undiscovered)').forEach(el=>{
    el.addEventListener('click',()=>showBugDetail(BUGS[parseInt(el.dataset.bid)]));
  });
}

function renderUpgrades(){
  const panel=document.getElementById('upgrades-panel');
  const cats={tools:'🔧 TOOLS',explore:'🗺️ EXPLORATION',income:'💰 INCOME'};
  let html='';
  for(const[catId,catName]of Object.entries(cats)){
    html+=`<div class="upgrade-section">${catName}</div>`;
    html+=UPGRADES.filter(u=>u.cat===catId).map(u=>{
      const lvl=S.upgrades[u.id];const maxed=lvl>=u.maxLvl;
      const cost=Math.floor(u.baseCost*Math.pow(1.7,lvl));
      const canBuy=!maxed&&S.coins>=cost;
      return `<button class="upgrade-btn" ${canBuy?'':'disabled'} data-uid="${u.id}" data-cost="${cost}">
        <span style="font-size:16px">${u.icon}</span>
        <div style="flex:1">
          <div>${u.name} ${maxed?'<span class="max-tag">MAX</span>':'Lv.'+lvl}</div>
          <div>${u.desc}</div>
          ${maxed?'':`<div class="cost">${cost} ⭐</div>`}
        </div>
      </button>`;
    }).join('');
  }
  panel.innerHTML=html;
  panel.querySelectorAll('.upgrade-btn:not([disabled])').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const uid=btn.dataset.uid,cost=parseInt(btn.dataset.cost);
      if(S.coins>=cost){S.coins-=cost;S.upgrades[uid]++;sfxUpgrade();
        addLog(`<span class="log-event">⬆️ ${uid} upgraded to Lv.${S.upgrades[uid]}!</span>`);
        updateHUD();renderDex();checkAchievements();
      }
    });
  });
}

function renderAchievements(){
  const panel=document.getElementById('achieve-panel');
  panel.innerHTML=ACHIEVEMENTS.map(a=>{
    const done=S.achievements[a.id];
    return `<div class="ach-entry ${done?'':'locked'}">
      <span class="icon">${done?a.icon:'🔒'}</span>
      <div style="flex:1;line-height:1.8">
        <div>${a.name}</div>
        <div style="opacity:.7">${a.desc}</div>
      </div>
      <div class="ach-reward">${done?'✓':a.reward+'⭐'}</div>
    </div>`;
  }).join('');
}

function checkAchievements(){
  let newAch=false;
  for(const a of ACHIEVEMENTS){
    if(!S.achievements[a.id]&&a.check(S)){
      S.achievements[a.id]=true;
      S.coins+=a.reward;
      addLog(`<span class="log-ach">🏅 Achievement: ${a.name}! +${a.reward}⭐</span>`);
      newAch=true;
      beep(880,.1);setTimeout(()=>beep(1100,.15),100);
    }
  }
  if(newAch){renderAchievements();updateHUD()}
}

function addLog(msg){
  S.log.unshift(msg);if(S.log.length>80)S.log.pop();
  document.getElementById('log-content').innerHTML=S.log.join('<br>');
}

// ── IDLE INCOME ──
function tickIdle(){
  if(S.upgrades.tent>0){
    const gain=S.upgrades.tent;
    S.idleCoins+=gain*0.1; // fractional accumulation
    if(S.idleCoins>=1){
      const whole=Math.floor(S.idleCoins);
      S.coins+=whole;S.idleCoins-=whole;
      updateHUD();
    }
  }
}

// ── SPARKLES ──
function spawnSparkle(){
  const s=document.createElement('div');s.className='sparkle';
  s.style.left=Math.random()*fW+'px';s.style.top=Math.random()*fH+'px';
  forest.appendChild(s);setTimeout(()=>s.remove(),1500);
}

// ── STORE BUG ID ON ELEMENTS ──
const origSpawn=spawnBug;
// We need to attach bug id — let's patch it. Actually let's fix the spawn function above.
// The spawnBug already creates el, let's just add dataset.bugId in the function.
// We already defined spawnBug so let's monkey-patch: add data attribute.
// Actually simpler: let me wrap the spawn
const _origSpawnBug=spawnBug;
// Hmm, since spawnBug references itself via closures, let's just modify it inline.
// Actually the cleanest fix: modify the DOM element creation inside spawnBug.
// Since JS is already evaluated, let's override:
// We'll do it differently - after el is created in spawnBug, we set dataset.bugId.
// But spawnBug is already a closed function. Let's create a wrapper:

// The simplest approach: re-patch the function by redefining it won't work since internal refs
// are closed. Instead, let's use MutationObserver or simply re-add the id in the net handler.
// Actually the cleanest: the net handler can just auto-catch whatever is there with a generic handler.
// Let me just make the net catch all with a stored map.

const bugElementMap=new WeakMap();
const _realSpawnBug=window.spawnBug||spawnBug;

// Store reference: We need to intercept. Since spawnBug is in the same scope, 
// the simplest thing is: after each bug is added to DOM, we need its data.
// Let me use a different approach for the net: just re-trigger click on all bugs.
// That's the simplest fix and works with existing click handlers.

// Override net handler to just click each bug element
document.getElementById('net-btn').replaceWith(document.getElementById('net-btn').cloneNode(true));
document.getElementById('net-btn').addEventListener('click',()=>{
  if(netCooldown)return;
  ensureAudio();beep(400,.05);
  const fl=document.createElement('div');fl.style.cssText='position:absolute;inset:0;background:rgba(255,255,255,0.4);z-index:25;pointer-events:none';
  forest.appendChild(fl);setTimeout(()=>fl.remove(),150);
  const all=forest.querySelectorAll('.bug-sprite:not(.caught)');
  all.forEach((el,i)=>{setTimeout(()=>{el.click()},i*80)});
  netCooldown=true;
  const btn=document.getElementById('net-btn');btn.classList.add('cooldown');
  const cd=Math.max(3,8-S.upgrades.speed);let rem=cd;
  btn.textContent=`🥅 ${rem}s`;
  const cdI=setInterval(()=>{rem--;btn.textContent=rem>0?`🥅 ${rem}s`:'🥅 NET';if(rem<=0){clearInterval(cdI);netCooldown=false;btn.classList.remove('cooldown')}},1000);
});

// ── INIT ──
function init(){
  resize();generateForest();renderDex();renderUpgrades();renderAchievements();updateHUD();
  addLog('🌿 Welcome to Bug Forest Explorer!');
  addLog('Tap bugs to catch them. Explore new areas!');
  showAreaBanner();

  // Main game tick (every ~500ms)
  setInterval(()=>{tickTime();tickIdle()},500);
  // Weather tick (every 2s)
  setInterval(tickWeather,2000);

  // Spawn loop
  function scheduleSpawn(){
    setTimeout(()=>{
      const active=forest.querySelectorAll('.bug-sprite:not(.caught)').length;
      const maxBugs=4+Math.floor(S.upgrades.lure/2);
      if(active<maxBugs)spawnBug();
      scheduleSpawn();
    },getSpawnRate());
  }
  scheduleSpawn();

  setInterval(spawnSparkle,900);
  setTimeout(spawnBug,400);setTimeout(spawnBug,900);setTimeout(spawnBug,1500);

  // Touch first interaction to enable audio
  document.addEventListener('click',ensureAudio,{once:true});
  document.addEventListener('touchstart',ensureAudio,{once:true});
}

init();
</script>
